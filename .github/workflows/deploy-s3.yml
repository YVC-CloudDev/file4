# ============================================================
# DEPLOY TO AWS S3 + CLOUDFRONT — GitHub Actions Workflow
# ============================================================

name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    name: Upload to S3 and Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:

      # 1. Get repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Verify connection
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # 4. Upload files to S3
      - name: Sync files to S3 bucket
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude "LICENSE"

      # 5. Invalidate CloudFront cache
      - name: Invalidate CloudFront cache
        run: |
          echo "Starting CloudFront invalidation..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
          echo "Invalidation request sent successfully!"
